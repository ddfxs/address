<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最新地址发布站 - 永久回家不迷路</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 { font-size: 24px; margin-bottom: 10px; font-weight: 700; color: #fff; }
        .notice-box {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.2);
            color: #fbbf24;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .list-title { text-align: left; font-size: 14px; color: #94a3b8; margin-bottom: 12px; font-weight: 600; }
        .url-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 16px 20px;
            border-radius: 16px;
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }
        .url-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }
        .info-part { text-align: left; }
        .name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .speed { font-size: 12px; color: #10b981; display: flex; align-items: center; gap: 4px; }
        .speed.testing { color: #94a3b8; }
        .speed.bad { color: #ef4444; }
        .visit-btn {
            background: #2563eb;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .visit-btn:hover { background: #1d4ed8; }
        footer { margin-top: 25px; font-size: 12px; color: #64748b; }
        #loading { font-size: 16px; color: #94a3b8; padding: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>最新地址发布站</h1>
    <div class="notice-box" id="notice">正在获取公告...</div>
    
    <div class="list-title">可用通道列表</div>
    <div id="loading">安全环境加载中，请稍候...</div>
    <div id="url-list"></div>

    <footer>
        <p>© 2026 永久地址发布页. 建议截图保存此页</p>
    </footer>
</div>

<script>
    // 自动化部署时，GitHub 会自动把加密数据注入到下面这个全局变量中
    // 如果您本地调试，可以直接把打包生成的 env.js 内容贴到这里
    window.DATA_PAYLOAD = "<!-- INJECT_DATA_HERE -->";

    // 基础解密及渲染逻辑
    function init() {
        let rawData;
        try {
            // 解密 GitHub Actions 预先加密好的数据
            const decoded = decodeURIComponent(atob(window.DATA_PAYLOAD));
            rawData = JSON.parse(decoded);
        } catch(e) {
            // 本地未编译时的兜底测试数据
            rawData = {
                "domains": [
                    {"name": "本地测试通道-A", "url": "https://www.baidu.com"},
                    {"name": "本地测试通道-B", "url": "https://www.qq.com"}
                ],
                "notice": "⚠️ 当前处于本地预览模式，上线后此公告和网址将被加密保护。"
            };
        }

        document.getElementById('notice').innerText = rawData.notice;
        const listContainer = document.getElementById('url-list');
        document.getElementById('loading').style.display = 'none';

        rawData.domains.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'url-card';
            card.innerHTML = `
                <div class="info-part">
                    <div class="name">${item.name}</div>
                    <div class="speed testing" id="speed-${index}">测速中...</div>
                </div>
                <a href="${item.url}" target="_blank" class="visit-btn">立即进入</a>
            `;
            listContainer.appendChild(card);
            testSpeed(item.url, index);
        });
    }

    // 延迟/测速核心算法
    function testSpeed(url, index) {
        const start = Date.now();
        const speedEl = document.getElementById(`speed-${index}`);
        
        // 尝试加载目标网站的一个极小静态资源（通常主站可以配一个空响应路由，或直接请求根目录）
        // 使用 no-cors 模式防止跨域阻止报错
        fetch(url, { mode: 'no-cors', cache: 'no-cache' })
        .then(() => {
            const duration = Date.now() - start;
            if (duration < 350) {
                speedEl.className = "speed";
                speedEl.innerText = `● 极速 ${duration}ms`;
            } else {
                speedEl.className = "speed";
                speedEl.style.color = "#eab308";
                speedEl.innerText = `● 正常 ${duration}ms`;
            }
        })
        .catch(() => {
            // 某些防跨域严格或彻底挂掉的域名
            speedEl.className = "speed bad";
            speedEl.innerText = "● 线路拥堵/检测中";
        });
    }

    window.onload = init;
</script>
</body>
</html>
